<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0F">
<title>Enfoque</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-top">
        <span class="eyebrow" id="today-label">Hoy</span>
        <span class="progress-count" id="progress-count">0/0</span>
      </div>
      <h1 class="page-title" id="page-title">Hábitos</h1>
      <div class="progress-track" id="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="content" id="content">

      <!-- TAB: HABITOS -->
      <section class="view" id="view-habits" data-view>
        <ul class="list" id="habits-list"></ul>

        <p class="empty-state" id="habits-empty" hidden>
          Nada por ahora.<br>Agrega tu primer hábito.
        </p>

        <form class="add-row" id="habit-form">
          <input type="text" id="habit-input" placeholder="Nuevo hábito" autocomplete="off" maxlength="60">
          <button type="submit" class="add-btn" aria-label="Agregar hábito">+</button>
        </form>
      </section>

      <!-- TAB: TO-DO -->
      <section class="view" id="view-todos" data-view hidden>
        <ul class="list" id="todos-list"></ul>

        <p class="empty-state" id="todos-empty" hidden>
          Sin tareas pendientes.<br>Agrega la primera.
        </p>

        <form class="todo-form" id="todo-form">
          <input type="text" id="todo-title" placeholder="Título de la tarea" autocomplete="off" maxlength="70">
          <textarea id="todo-desc" placeholder="Descripción (opcional)" rows="1" maxlength="200"></textarea>
          <div class="todo-form-row">
            <input type="date" id="todo-due" aria-label="Fecha límite">
            <button type="submit" class="add-btn" aria-label="Agregar tarea">+</button>
          </div>
        </form>
      </section>

      <!-- TAB: RUTINAS -->
      <section class="view" id="view-routines" data-view hidden>

        <div id="routines-index">
          <ul class="list" id="routines-list"></ul>

          <p class="empty-state" id="routines-empty" hidden>
            Sin rutinas todavía.<br>Crea tu primera rutina de ejercicio.
          </p>

          <form class="add-row" id="routine-form">
            <input type="text" id="routine-input" placeholder="Nueva rutina (ej. Empuje)" autocomplete="off" maxlength="40">
            <button type="submit" class="add-btn" aria-label="Agregar rutina">+</button>
          </form>
        </div>

        <div id="routine-detail" hidden>
          <button class="back-btn" id="routine-back">← Rutinas</button>
          <h2 class="detail-title" id="routine-detail-title"></h2>
          <ul class="list" id="exercises-list"></ul>

          <p class="empty-state" id="exercises-empty" hidden>
            Sin ejercicios en esta rutina.
          </p>

          <form class="add-row" id="exercise-form">
            <input type="text" id="exercise-input" placeholder="Ejercicio (ej. Sentadilla 4x10)" autocomplete="off" maxlength="60">
            <button type="submit" class="add-btn" aria-label="Agregar ejercicio">+</button>
          </form>

          <button class="danger-link" id="routine-delete">Eliminar rutina</button>
        </div>
      </section>

      <!-- TAB: CALENDARIO -->
      <section class="view" id="view-calendar" data-view hidden>
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev" aria-label="Mes anterior">‹</button>
          <span class="cal-month-label" id="cal-month-label"></span>
          <button class="cal-nav" id="cal-next" aria-label="Mes siguiente">›</button>
        </div>

        <div class="cal-weekdays">
          <span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span>
        </div>

        <div class="cal-grid" id="cal-grid"></div>

        <div class="cal-legend">
          <span><i class="dot dot-good"></i>Completo</span>
          <span><i class="dot dot-partial"></i>Parcial</span>
          <span><i class="dot dot-none"></i>Nada</span>
        </div>

        <p class="cal-detail" id="cal-detail"></p>
      </section>

    </main>

    <!-- TAB BAR -->
    <nav class="tabbar" id="tabbar">
      <button class="tab-btn is-active" data-tab="habits" aria-label="Hábitos">
        <svg viewBox="0 0 24 24" class="tab-icon"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
        <span>Hábitos</span>
      </button>
      <button class="tab-btn" data-tab="todos" aria-label="To-Do">
        <svg viewBox="0 0 24 24" class="tab-icon"><path d="M9 2a1 1 0 0 0-1 1v1H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3V3a1 1 0 0 0-1-1zm0 2h6v2H9zM5 6h2v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6h2v13H5z"/></svg>
        <span>To-Do</span>
      </button>
      <button class="tab-btn" data-tab="routines" aria-label="Rutinas">
        <svg viewBox="0 0 24 24" class="tab-icon"><path d="M20.57 14.86 22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57l1.43 1.43L2 13.43 3.43 14.86 5.57 12.71 7 14.14 5.86 15.29 7.29 16.71 8.43 15.57 15.57 22.71z"/></svg>
        <span>Rutinas</span>
      </button>
      <button class="tab-btn" data-tab="calendar" aria-label="Calendario">
        <svg viewBox="0 0 24 24" class="tab-icon"><path d="M7 2v2H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2zm12 8v9H5v-9zM5 6h2v1h2V6h6v1h2V6h2v2H5z"/></svg>
        <span>Progreso</span>
      </button>
    </nav>

  </div>

<script src="app.js"></script>
</body>
</html>
